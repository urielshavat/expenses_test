<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>מחשבון הלוואה</title>
  <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;700;900&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #f0f4fb;
      --surface: #ffffff;
      --surface2: #f5f7fc;
      --border: #dde3f0;
      --accent: #3a7ef5;
      --accent2: #6c47f5;
      --gold: #d4930a;
      --text: #1a2035;
      --muted: #7a86a3;
      --danger: #e03355;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Heebo', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem 1rem;
      position: relative;
      overflow-x: hidden;
    }

    /* background grid */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(58,126,245,0.06) 1px, transparent 1px),
        linear-gradient(90deg, rgba(58,126,245,0.06) 1px, transparent 1px);
      background-size: 48px 48px;
      pointer-events: none;
    }

    /* glowing orbs */
    body::after {
      content: '';
      position: fixed;
      width: 600px; height: 600px;
      background: radial-gradient(circle, rgba(108,71,245,0.07) 0%, transparent 70%);
      top: -200px; left: -200px;
      pointer-events: none;
    }

    .orb2 {
      position: fixed;
      width: 500px; height: 500px;
      background: radial-gradient(circle, rgba(58,126,245,0.07) 0%, transparent 70%);
      bottom: -150px; right: -150px;
      pointer-events: none;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 24px;
      padding: 3rem 3rem 2.5rem;
      width: 100%;
      max-width: 560px;
      position: relative;
      box-shadow: 0 8px 48px rgba(58,126,245,0.10), 0 1px 3px rgba(0,0,0,0.07);
      animation: slideUp 0.6s cubic-bezier(0.22, 1, 0.36, 1) both;
    }

    @keyframes slideUp {
      from { opacity: 0; transform: translateY(32px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* pill badge */
    .badge {
      display: inline-block;
      background: linear-gradient(135deg, rgba(79,142,247,0.15), rgba(124,92,252,0.15));
      border: 1px solid rgba(79,142,247,0.3);
      border-radius: 100px;
      padding: 4px 14px;
      font-size: 0.72rem;
      font-weight: 500;
      letter-spacing: 0.08em;
      color: var(--accent);
      text-transform: uppercase;
      margin-bottom: 1rem;
    }

    h1 {
      font-size: 2.1rem;
      font-weight: 900;
      line-height: 1.1;
      margin-bottom: 0.4rem;
      background: linear-gradient(135deg, var(--text) 40%, var(--accent2));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .subtitle {
      color: var(--muted);
      font-size: 0.9rem;
      margin-bottom: 2.2rem;
    }

    /* divider */
    .divider {
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--border), transparent);
      margin-bottom: 2rem;
    }

    .field {
      margin-bottom: 1.4rem;
    }

    label {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 0.82rem;
      font-weight: 500;
      color: var(--muted);
      letter-spacing: 0.04em;
      text-transform: uppercase;
      margin-bottom: 0.55rem;
    }

    label .icon {
      width: 18px; height: 18px;
      opacity: 0.7;
    }

    .input-wrap {
      position: relative;
    }

    input[type="number"] {
      width: 100%;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 12px;
      color: var(--text);
      font-family: 'Heebo', sans-serif;
      font-size: 1.05rem;
      font-weight: 500;
      padding: 0.8rem 1rem 0.8rem 3.2rem;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
      -moz-appearance: textfield;
      appearance: textfield;
    }

    input[type="number"]::-webkit-inner-spin-button,
    input[type="number"]::-webkit-outer-spin-button { -webkit-appearance: none; }

    input[type="number"]:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(79,142,247,0.15);
    }

    .suffix {
      position: absolute;
      left: 1rem;
      top: 50%;
      transform: translateY(-50%);
      color: var(--muted);
      font-size: 0.85rem;
      font-weight: 600;
      pointer-events: none;
    }

    /* range slider */
    .slider-wrap {
      margin-top: 0.6rem;
    }

    input[type="range"] {
      -webkit-appearance: none;
      appearance: none;
      width: 100%;
      height: 4px;
      border-radius: 4px;
      background: var(--border);
      outline: none;
      cursor: pointer;
    }

    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 18px; height: 18px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      border: 2px solid var(--surface);
      box-shadow: 0 0 8px rgba(79,142,247,0.5);
      cursor: pointer;
      transition: transform 0.15s;
    }

    input[type="range"]::-webkit-slider-thumb:hover { transform: scale(1.2); }

    .slider-labels {
      display: flex;
      justify-content: space-between;
      margin-top: 4px;
      font-size: 0.72rem;
      color: var(--muted);
    }

    /* results section */
    .results {
      margin-top: 2rem;
      opacity: 0;
      transform: translateY(16px);
      transition: opacity 0.4s ease, transform 0.4s ease;
      pointer-events: none;
    }

    .results.visible {
      opacity: 1;
      transform: translateY(0);
      pointer-events: auto;
    }

    .results-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1rem;
      margin-bottom: 1.2rem;
    }

    .result-card {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 1.2rem 1rem;
      text-align: center;
      position: relative;
      overflow: hidden;
    }

    .result-card.highlight {
      border-color: rgba(79,142,247,0.4);
      background: linear-gradient(160deg, rgba(79,142,247,0.08), rgba(124,92,252,0.05));
    }

    .result-card .rc-label {
      font-size: 0.72rem;
      font-weight: 500;
      color: var(--muted);
      letter-spacing: 0.06em;
      text-transform: uppercase;
      margin-bottom: 0.5rem;
    }

    .result-card .rc-value {
      font-size: 1.55rem;
      font-weight: 900;
      line-height: 1;
    }

    .result-card.highlight .rc-value {
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .result-card .rc-sub {
      font-size: 0.75rem;
      color: var(--muted);
      margin-top: 4px;
    }

    /* breakdown bar */
    .breakdown {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 1.2rem 1.2rem 1rem;
    }

    .breakdown-title {
      font-size: 0.78rem;
      font-weight: 600;
      color: var(--muted);
      letter-spacing: 0.06em;
      text-transform: uppercase;
      margin-bottom: 0.9rem;
    }

    .bar-track {
      height: 10px;
      border-radius: 100px;
      overflow: hidden;
      margin-bottom: 0.8rem;
      display: flex;
      background: transparent;
    }

    .bar-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--accent), var(--accent2));
      transition: width 0.7s cubic-bezier(0.22, 1, 0.36, 1);
      width: 0%;
    }

    .bar-fill-interest {
      height: 100%;
      background: var(--gold);
      transition: width 0.7s cubic-bezier(0.22, 1, 0.36, 1);
      width: 0%;
    }

    .bar-legend {
      display: flex;
      justify-content: space-between;
      font-size: 0.78rem;
    }

    .legend-item { display: flex; align-items: center; gap: 6px; }
    .legend-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
    }
    .legend-dot.principal { background: linear-gradient(135deg, var(--accent), var(--accent2)); }
    .legend-dot.interest  { background: var(--gold); }

    .legend-item .lval { font-weight: 700; margin-right: 2px; }
    .legend-item .lpct { color: var(--muted); font-size: 0.72rem; }

    /* error */
    .error-msg {
      display: none;
      color: var(--danger);
      font-size: 0.82rem;
      margin-top: 0.5rem;
      padding: 0.6rem 1rem;
      background: rgba(247,79,110,0.1);
      border: 1px solid rgba(247,79,110,0.25);
      border-radius: 8px;
    }

    .error-msg.show { display: block; }

    /* footer */
    .card-footer {
      margin-top: 1.8rem;
      text-align: center;
      font-size: 0.75rem;
      color: var(--muted);
    }

    @media (max-width: 480px) {
      .card { padding: 2rem 1.5rem; }
      h1 { font-size: 1.7rem; }
      .results-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div class="orb2"></div>

  <div class="card">
    <div class="badge">כלי פיננסי</div>
    <h1>מחשבון הלוואה</h1>
    <p class="subtitle">חשב את ההחזר החודשי וסך הריבית שלך בשניות</p>
    <div class="divider"></div>

    <!-- סכום הלוואה -->
    <div class="field">
      <label>
        <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="12" cy="12" r="9"/><path d="M14.5 8.5a2.5 2.5 0 00-5 0c0 2 5 2 5 4a2.5 2.5 0 01-5 0"/>
          <line x1="12" y1="6" x2="12" y2="7"/><line x1="12" y1="17" x2="12" y2="18"/>
        </svg>
        סכום הלוואה
      </label>
      <div class="input-wrap">
        <input type="number" id="principal" min="1000" max="200000" step="1000" value="50000" oninput="syncSlider('principal','sP')" />
        <span class="suffix">₪</span>
      </div>
      <div class="slider-wrap">
        <input type="range" id="sP" min="1000" max="200000" step="1000" value="50000"
          oninput="document.getElementById('principal').value=this.value; calculate();" />
        <div class="slider-labels"><span>₪1,000</span><span>₪200,000</span></div>
      </div>
    </div>

    <!-- ריבית שנתית -->
    <div class="field">
      <label>
        <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <line x1="19" y1="5" x2="5" y2="19"/>
          <circle cx="6.5" cy="6.5" r="2.5"/><circle cx="17.5" cy="17.5" r="2.5"/>
        </svg>
        ריבית שנתית
      </label>
      <div class="input-wrap">
        <input type="number" id="rate" min="0.1" max="30" step="0.1" value="4.5" oninput="syncSlider('rate','sR')" />
        <span class="suffix">%</span>
      </div>
      <div class="slider-wrap">
        <input type="range" id="sR" min="0.1" max="30" step="0.1" value="4.5"
          oninput="document.getElementById('rate').value=this.value; calculate();" />
        <div class="slider-labels"><span>0.1%</span><span>30%</span></div>
      </div>
    </div>

    <!-- מספר שנים -->
    <div class="field">
      <label>
        <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/>
          <line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/>
        </svg>
        תקופת ההלוואה
      </label>
      <div class="input-wrap">
        <input type="number" id="years" min="1" max="12" step="1" value="5" oninput="syncSlider('years','sY')" />
        <span class="suffix">שנ׳</span>
      </div>
      <div class="slider-wrap">
        <input type="range" id="sY" min="1" max="12" step="1" value="5"
          oninput="document.getElementById('years').value=this.value; calculate();" />
        <div class="slider-labels"><span>שנה 1</span><span>12 שנה</span></div>
      </div>
    </div>

    <div id="errorMsg" class="error-msg">אנא הזן ערכים חיוביים בכל השדות.</div>

    <!-- תוצאות -->
    <div class="results" id="results">
      <div class="results-grid">
        <div class="result-card highlight">
          <div class="rc-label">החזר חודשי</div>
          <div class="rc-value" id="rMonthly">—</div>
          <div class="rc-sub">₪ לחודש</div>
        </div>
        <div class="result-card">
          <div class="rc-label">סה״כ ריבית</div>
          <div class="rc-value" id="rInterest" style="color: var(--gold); font-weight:900;">—</div>
          <div class="rc-sub">₪ לאורך כל התקופה</div>
        </div>
      </div>

      <div class="breakdown">
        <div class="breakdown-title">פירוט סה״כ תשלומים</div>
        <div class="bar-track">
          <div class="bar-fill" id="barFill"></div>
          <div class="bar-fill-interest" id="barFillInterest"></div>
        </div>
        <div class="bar-legend">
          <div class="legend-item">
            <div class="legend-dot principal"></div>
            <span class="lval" id="lPrincipal">—</span>
            <span class="lpct" id="lPctP"></span>
            <span style="color:var(--muted)">קרן</span>
          </div>
          <div class="legend-item">
            <span style="color:var(--muted)">ריבית</span>
            <span class="lval" id="lInterest">—</span>
            <span class="lpct" id="lPctI"></span>
            <div class="legend-dot interest"></div>
          </div>
        </div>
      </div>
    </div>

    <div class="card-footer">* החישוב מבוסס על שיטת ריבית שפיצר (החזר חודשי קבוע)</div>
  </div>

  <script>
    function fmt(n) {
      return n.toLocaleString('he-IL', { maximumFractionDigits: 0 });
    }

    function syncSlider(inputId, sliderId) {
      const val = parseFloat(document.getElementById(inputId).value);
      const slider = document.getElementById(sliderId);
      if (!isNaN(val)) slider.value = val;
      calculate();
    }

    function calculate() {
      const P = parseFloat(document.getElementById('principal').value);
      const annualRate = parseFloat(document.getElementById('rate').value);
      const years = parseFloat(document.getElementById('years').value);
      const errEl = document.getElementById('errorMsg');

      if (!P || !annualRate || !years || P <= 0 || annualRate <= 0 || years <= 0) {
        errEl.classList.add('show');
        return;
      }
      errEl.classList.remove('show');

      const r = annualRate / 100 / 12;
      const n = years * 12;
      const monthly = (P * r * Math.pow(1 + r, n)) / (Math.pow(1 + r, n) - 1);
      const totalPaid = monthly * n;
      const totalInterest = totalPaid - P;
      const principalPct = (P / totalPaid) * 100;

      document.getElementById('rMonthly').textContent = '₪' + fmt(monthly);
      document.getElementById('rInterest').textContent = '₪' + fmt(totalInterest);
      document.getElementById('lPrincipal').textContent = '₪' + fmt(P);
      document.getElementById('lInterest').textContent = '₪' + fmt(totalInterest);
      document.getElementById('lPctP').textContent = '(' + principalPct.toFixed(0) + '%)';
      document.getElementById('lPctI').textContent = '(' + (100 - principalPct).toFixed(0) + '%)';

      // animate bar
      setTimeout(() => {
        document.getElementById('barFill').style.width = principalPct + '%';
        document.getElementById('barFillInterest').style.width = (100 - principalPct) + '%';
      }, 50);

      // show results
      const res = document.getElementById('results');
      res.classList.add('visible');
    }

    // calculate on load
    window.addEventListener('load', calculate);
  </script>
</body>
</html>
