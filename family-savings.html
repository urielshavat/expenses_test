<!DOCTYPE html>
<html lang="he" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>מחשבון חיסכון משפחתי</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;700;900&display=swap" rel="stylesheet">
    <style>
      body { font-family: 'Heebo', sans-serif; background-color: #f8fafc; color: #1e293b; }
      .btn-primary { background: linear-gradient(135deg, #059669 0%, #10b981 100%); transition: all 0.2s; }
      .btn-primary:hover { transform: translateY(-1px); box-shadow: 0 8px 16px -8px rgba(16,185,129,0.5); }
      input:focus, select:focus { border-color: #10b981 !important; box-shadow: 0 0 0 3px rgba(16,185,129,0.1); }
      @keyframes slideIn { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:translateY(0); } }
      .animate-slide-in { animation: slideIn 0.25s ease-out forwards; }
      @media print {
        @page { margin: 15mm; size: A4; }
        body { background: white !important; font-size: 12px; }
        header { position: static !important; box-shadow: none !important; border-bottom: 1px solid #e2e8f0 !important; }
        .no-print { display: none !important; }
        .print-expand { max-height: none !important; overflow: visible !important; }
        section, .bg-white { break-inside: avoid; }
        button { display: none !important; }
        .btn-primary, .bg-blue-600 { display: none !important; }
        footer { display: none !important; }
        h1 { font-size: 16px !important; }
        .text-4xl { font-size: 28px !important; }
        .text-2xl { font-size: 20px !important; }
        .text-lg { font-size: 14px !important; }
        canvas { max-width: 100% !important; }
      }
    </style>
    <script src="https://unpkg.com/@babel/standalone@7.24.7/babel.min.js"></script>
    <script type="importmap">
    {
      "imports": {
        "react": "https://esm.sh/react@18.3.1",
        "react-dom": "https://esm.sh/react-dom@18.3.1",
        "react-dom/client": "https://esm.sh/react-dom@18.3.1/client",
        "lucide-react": "https://esm.sh/lucide-react@0.460.0?deps=react@18.3.1",
        "recharts": "https://esm.sh/recharts@2.13.0?deps=react@18.3.1,react-dom@18.3.1"
      }
    }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="text/babel" data-type="module" data-presets="react,typescript">
      import React, { useState, useCallback, useRef, useMemo } from 'react';
      import { createRoot } from 'react-dom/client';
      import { Settings, Plus, Trash2, Calculator, Download, Upload, TrendingUp, Wallet, Sparkles, Info, AlertCircle, ChevronDown, Clock, ChevronUp, FileText } from 'lucide-react';
      import { AreaChart, Area, XAxis, YAxis, CartesianGrid, Tooltip, ResponsiveContainer, ReferenceLine } from 'recharts';

      const addMonths = (date, months) => { const d = new Date(date); d.setMonth(d.getMonth() + months); return d; };
      const formatDate = (date) => new Intl.DateTimeFormat('he-IL', { month: 'short', year: 'numeric' }).format(date);
      const getMonthlyRate = (annualRate) => Math.pow(1 + annualRate / 100, 1 / 12) - 1;
      const generateId = () => crypto.randomUUID?.() || Math.random().toString(36).substring(2, 11);
      const formatCurrency = (v) => new Intl.NumberFormat('he-IL', { style: 'currency', currency: 'ILS', maximumFractionDigits: 0 }).format(v);

      const runSimulationPeriod = (startBalance, startCostBasis, startNominalBasis, startDate, startMonthIndex, durationMonths, monthlyDeposit, params, eventsInPeriod) => {
        let balance = startBalance, costBasis = startCostBasis, nominalBasis = startNominalBasis;
        const schedule = []; let failed = false;
        const monthlyReturnRate = getMonthlyRate(params.annualReturn);
        const monthlyInflationRate = getMonthlyRate(params.annualInflation);
        const taxRate = params.capitalGainsTax / 100;
        for (let i = 0; i < durationMonths; i++) {
          const currentMonthIndex = startMonthIndex + i;
          const currentDate = addMonths(startDate, i);
          const balanceStart = balance;
          balance += monthlyDeposit; costBasis += monthlyDeposit; nominalBasis += monthlyDeposit;
          balance *= (1 + monthlyReturnRate); costBasis *= (1 + monthlyInflationRate);
          const monthEvents = eventsInPeriod.get(currentMonthIndex);
          let mGross = 0, mNet = 0, mTax = 0, mPreBal = 0, mRealProfit = 0, mNominalProfit = 0, eventRef = undefined;
          if (monthEvents) {
            mPreBal = balance;
            for (const event of monthEvents) {
              eventRef = event;
              const inflationFactor = Math.pow(1 + monthlyInflationRate, currentMonthIndex);
              const targetNetNominal = event.targetAmount * inflationFactor;
              const realProfitRatio = balance > 0 ? Math.max(0, (balance - costBasis) / balance) : 0;
              const nominalProfitRatio = balance > 0 ? Math.max(0, (balance - nominalBasis) / balance) : 0;
              const effectiveTaxRate = realProfitRatio * taxRate;
              const grossNeeded = targetNetNominal / (1 - effectiveTaxRate);
              if (balance < grossNeeded) failed = true;
              const tax = Math.max(0, grossNeeded - targetNetNominal);
              const realProfitInWithdrawal = grossNeeded * realProfitRatio;
              const nominalProfitInWithdrawal = grossNeeded * nominalProfitRatio;
              balance -= grossNeeded;
              const withdrawalRatio = (balance + grossNeeded > 0) ? (grossNeeded / (balance + grossNeeded)) : 1;
              costBasis *= (1 - withdrawalRatio); nominalBasis *= (1 - withdrawalRatio);
              mGross += grossNeeded; mNet += targetNetNominal; mTax += tax;
              mRealProfit += realProfitInWithdrawal; mNominalProfit += nominalProfitInWithdrawal;
            }
          }
          schedule.push({ monthIndex: currentMonthIndex, date: formatDate(currentDate), deposit: monthlyDeposit, balanceStart, balanceEnd: balance, eventOccurred: eventRef, withdrawalGross: mGross > 0 ? mGross : undefined, withdrawalNet: mNet > 0 ? mNet : undefined, taxPaid: mTax > 0 ? mTax : undefined, realProfit: mGross > 0 ? mRealProfit : undefined, nominalProfit: mGross > 0 ? mNominalProfit : undefined, preWithdrawalBalance: mGross > 0 ? mPreBal : undefined });
          if (balance < -1) failed = true;
        }
        return { schedule, finalBalance: balance, finalCostBasis: costBasis, finalNominalBasis: nominalBasis, failed };
      };

      const solveRequiredDeposit = (bal, cb, ncb, start, startIdx, events, params) => {
        if (events.length === 0) return 0;
        let low = 0, high = 20000000, result = high;
        const maxIdx = Math.max(...events.map(e => e.monthOffset));
        const evMap = new Map();
        events.forEach(e => { if(!evMap.has(e.monthOffset)) evMap.set(e.monthOffset, []); evMap.get(e.monthOffset).push(e); });
        for (let i = 0; i < 25; i++) {
          const mid = (low + high) / 2;
          const sim = runSimulationPeriod(bal, cb, ncb, start, startIdx, maxIdx - startIdx + 1, mid, params, evMap);
          if (sim.failed) low = mid; else { result = mid; high = mid; }
        }
        return Math.ceil(result / 10) * 10;
      };

      const calculateSavingsPlan = (params, events) => {
        const sorted = [...events].sort((a,b) => a.monthOffset - b.monthOffset);
        if (sorted.length === 0) return { success: true, schedule: [], finalBalance: params.initialCapital, totalDeposited: 0, totalTaxPaid: 0, totalWithdrawnNet: 0 };
        const fullSchedule = []; let curBal = params.initialCapital, curCB = params.initialCapital, curNCB = params.initialCapital, curMonth = 0, maxDepConstraint = Infinity;
        const eventMonths = Array.from(new Set(sorted.map(e => e.monthOffset))).sort((a,b) => a-b);
        for (const mIdx of eventMonths) {
          const rem = sorted.filter(e => e.monthOffset >= curMonth);
          const requiredForFuture = solveRequiredDeposit(curBal, curCB, curNCB, addMonths(new Date(params.startDate), curMonth), curMonth, rem, params);
          let deposit = Math.min(requiredForFuture, maxDepConstraint);
          maxDepConstraint = deposit;
          const segmentEvents = new Map();
          segmentEvents.set(mIdx, sorted.filter(e => e.monthOffset === mIdx));
          const sim = runSimulationPeriod(curBal, curCB, curNCB, addMonths(new Date(params.startDate), curMonth), curMonth, mIdx - curMonth + 1, deposit, params, segmentEvents);
          fullSchedule.push(...sim.schedule);
          curBal = sim.finalBalance; curCB = sim.finalCostBasis; curNCB = sim.finalNominalBasis;
          curMonth = mIdx + 1;
        }
        return { success: !fullSchedule.some(s => s.balanceEnd < -1), schedule: fullSchedule, finalBalance: curBal, totalDeposited: fullSchedule.reduce((a, s) => a + s.deposit, 0), totalTaxPaid: fullSchedule.reduce((a, s) => a + (s.taxPaid || 0), 0), totalWithdrawnNet: fullSchedule.reduce((a, s) => a + (s.withdrawalNet || 0), 0) };
      };

      // Collapsible section for mobile
      const Section = ({ title, icon: Icon, color = "text-emerald-600", children, defaultOpen = true }) => {
        const [open, setOpen] = useState(defaultOpen);
        return (
          <div className="bg-white rounded-2xl border border-slate-200 overflow-hidden shadow-sm">
            <button onClick={() => setOpen(!open)} className="w-full flex items-center justify-between px-4 py-3 text-right">
              <div className="flex items-center gap-2">
                <Icon size={16} className={color} />
                <span className="text-sm font-black text-slate-800">{title}</span>
              </div>
              {open ? <ChevronUp size={16} className="text-slate-400" /> : <ChevronDown size={16} className="text-slate-400" />}
            </button>
            {open && <div className="px-4 pb-4 border-t border-slate-100">{children}</div>}
          </div>
        );
      };

      // Compact input field
      const Field = ({ label, children }) => (
        <div className="space-y-1">
          <label className="text-[10px] font-black text-slate-400 uppercase tracking-widest">{label}</label>
          {children}
        </div>
      );

      const inputCls = "w-full bg-slate-50 border border-slate-200 rounded-xl px-3 py-2 text-sm font-bold focus:outline-none transition-all";

      const App = () => {
        const [params, setParams] = useState({ startDate: new Date().toISOString().split('T')[0], annualReturn: 7, annualInflation: 2, capitalGainsTax: 25, initialCapital: 0 });
        const [events, setEvents] = useState([]);
        const [simulation, setSimulation] = useState(null);
        const [isCalculating, setIsCalculating] = useState(false);
        const fileRef = useRef(null);

        const handleCalculate = () => {
          setIsCalculating(true);
          setTimeout(() => { setSimulation(calculateSavingsPlan(params, events)); setIsCalculating(false); }, 400);
        };

        const handleAdd = () => {
          const lastOffset = events.length ? Math.max(...events.map(e => e.monthOffset)) : 0;
          setEvents([...events, { id: generateId(), name: `אירוע ${events.length + 1}`, targetAmount: 10000, monthOffset: lastOffset + 12 }]);
        };

        const handleUpd = (id, f, v) => setEvents(events.map(e => e.id === id ? {...e, [f]: v} : e));
        const handleDel = (id) => setEvents(events.filter(e => e.id !== id));

        const dateOptions = useMemo(() => {
          const start = new Date(params.startDate);
          return Array.from({ length: 481 }, (_, i) => {
            const d = addMonths(start, i);
            const y = Math.floor(i/12), m = i%12;
            const diff = i === 0 ? "החודש" : `${y > 0 ? y + ' ש\'' : ''} ${m > 0 ? m + ' ח\'' : ''}`.trim();
            return { v: i, l: `${d.getMonth() + 1}/${d.getFullYear()} (${diff})` };
          });
        }, [params.startDate]);

        return (
          <div className="min-h-screen pb-24">
            {/* Compact header */}
            <header className="bg-white border-b border-slate-200 sticky top-0 z-20">
              <div className="max-w-2xl mx-auto px-4 py-3 flex items-center justify-between">
                <div className="flex items-center gap-2">
                  <div className="bg-emerald-600 p-1.5 rounded-xl text-white">
                    <Calculator size={18} strokeWidth={2.5} />
                  </div>
                  <div>
                    <h1 className="text-sm font-black text-slate-800 leading-tight">מחשבון חיסכון משפחתי</h1>
                    <p className="text-[9px] font-bold text-emerald-600 uppercase tracking-widest">Family Savings Planner</p>
                  </div>
                </div>
                <div className="flex gap-1">
                  {simulation && (
                    <button onClick={() => window.print()} className="p-2 text-emerald-600 hover:bg-emerald-50 rounded-xl transition" title="הורד PDF">
                      <FileText size={16} />
                    </button>
                  )}
                  <button onClick={() => { const blob = new Blob([JSON.stringify({ params, events })], { type: 'application/json' }); const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = 'savings.json'; a.click(); }} className="p-2 text-slate-500 hover:bg-slate-100 rounded-xl transition no-print">
                    <Download size={16} />
                  </button>
                  <button onClick={() => fileRef.current.click()} className="p-2 text-slate-500 hover:bg-slate-100 rounded-xl transition no-print">
                    <Upload size={16} />
                  </button>
                  <input type="file" ref={fileRef} className="hidden" onChange={(e) => { const f = e.target.files[0]; if(!f) return; const r = new FileReader(); r.onload = (ev) => { try { const d = JSON.parse(ev.target.result); setParams(d.params); setEvents(d.events); setSimulation(null); } catch(e) { alert('קובץ לא תקין'); } }; r.readAsText(f); }} />
                </div>
              </div>
            </header>

            <main className="max-w-2xl mx-auto px-3 mt-4 space-y-3">
              {/* Settings - 2-col compact grid */}
              <Section title="הגדרות השקעה" icon={Settings} defaultOpen={true}>
                <div className="pt-3 grid grid-cols-2 gap-3">
                  <Field label="תאריך התחלה">
                    <input type="date" value={params.startDate} onChange={e => setParams({...params, startDate: e.target.value})} className={inputCls} />
                  </Field>
                  <Field label="הון התחלתי (₪)">
                    <input type="number" step="1000" value={params.initialCapital} onChange={e => setParams({...params, initialCapital: +e.target.value})} className={inputCls} />
                  </Field>
                  <Field label="תשואה שנתית (%)">
                    <input type="number" step="0.1" value={params.annualReturn} onChange={e => setParams({...params, annualReturn: +e.target.value})} className={inputCls} />
                  </Field>
                  <Field label="אינפלציה (%)">
                    <input type="number" step="0.1" value={params.annualInflation} onChange={e => setParams({...params, annualInflation: +e.target.value})} className={inputCls} />
                  </Field>
                  <Field label="מס רווח הון (%)">
                    <input type="number" value={params.capitalGainsTax} onChange={e => setParams({...params, capitalGainsTax: +e.target.value})} className={`${inputCls} col-span-1`} />
                  </Field>
                </div>
              </Section>

              {/* Events */}
              <Section title={`אירועים ומשיכות (${events.length})`} icon={Clock} color="text-blue-600" defaultOpen={true}>
                <div className="pt-3 space-y-3">
                  {events.length === 0 && (
                    <div className="text-center py-8 bg-slate-50 rounded-xl border-2 border-dashed border-slate-200">
                      <p className="text-slate-400 text-xs font-bold">הוסיפו אירועי משפחה לתכנון</p>
                    </div>
                  )}
                  {events.map((e) => {
                    const inflation = getMonthlyRate(params.annualInflation);
                    const adjusted = e.targetAmount * Math.pow(1 + inflation, e.monthOffset);
                    return (
                      <div key={e.id} className="animate-slide-in bg-slate-50 border border-slate-100 rounded-2xl p-3 space-y-2">
                        <div className="flex items-center gap-2">
                          <input type="text" value={e.name} onChange={x => handleUpd(e.id, 'name', x.target.value)} className="flex-1 bg-white border border-slate-200 rounded-xl px-3 py-2 text-sm font-bold focus:outline-none" placeholder="שם האירוע" />
                          <button onClick={() => handleDel(e.id)} className="text-slate-300 hover:text-rose-500 transition p-1">
                            <Trash2 size={16}/>
                          </button>
                        </div>
                        <div className="grid grid-cols-2 gap-2">
                          <div>
                            <label className="text-[9px] font-black text-slate-400 uppercase">מועד</label>
                            <div className="relative">
                              <select value={e.monthOffset} onChange={x => handleUpd(e.id, 'monthOffset', +x.target.value)} className="w-full bg-white border border-slate-200 rounded-xl px-3 py-2 text-xs font-bold appearance-none focus:outline-none">
                                {dateOptions.map(o => <option key={o.v} value={o.v}>{o.l}</option>)}
                              </select>
                              <ChevronDown className="absolute left-2 top-1/2 -translate-y-1/2 text-slate-400 pointer-events-none" size={12} />
                            </div>
                          </div>
                          <div>
                            <label className="text-[9px] font-black text-slate-400 uppercase">סכום נטו (היום)</label>
                            <input type="number" step="1000" value={e.targetAmount} onChange={x => handleUpd(e.id, 'targetAmount', +x.target.value)} className="w-full bg-white border border-slate-200 rounded-xl px-3 py-2 text-xs font-bold focus:outline-none" />
                          </div>
                        </div>
                        <p className="text-[10px] text-slate-400 font-bold">מתואם מדד: <span className="text-emerald-600 font-black">{formatCurrency(adjusted)}</span></p>
                      </div>
                    );
                  })}
                </div>
              </Section>

              {/* Action buttons */}
              <div className="flex gap-2 no-print">
                <button onClick={handleAdd} className="bg-blue-600 hover:bg-blue-700 text-white flex-1 py-3 rounded-xl text-sm font-black flex items-center justify-center gap-1.5 transition shadow-md shadow-blue-100">
                  <Plus size={16} strokeWidth={3} /> הוסף אירוע
                </button>
                <button onClick={handleCalculate} disabled={isCalculating} className="btn-primary text-white flex-1 py-3 rounded-xl shadow-lg shadow-emerald-100 flex items-center justify-center gap-2 disabled:opacity-50 text-sm font-black">
                  {isCalculating ? <div className="w-4 h-4 border-2 border-white/30 border-t-white rounded-full animate-spin"></div> : <><Sparkles size={16} /> חשב תוכנית</>}
                </button>
              </div>

              {/* Results */}
              {simulation && (
                <div className="space-y-3 animate-slide-in">
                  {/* Summary cards */}
                  <div className="bg-white rounded-2xl border border-slate-200 p-4 shadow-sm">
                    <p className="text-[10px] font-black text-emerald-600 uppercase tracking-widest mb-1">הפקדה חודשית מומלצת</p>
                    <p className="text-4xl font-black text-slate-900">{formatCurrency(simulation.schedule[0]?.deposit || 0)}</p>
                    <p className="text-xs text-slate-400 font-bold mt-1">הסכום המרבי להפקדה — עשוי לרדת לאחר אירועים</p>
                  </div>
                  <div className="grid grid-cols-2 gap-2">
                    <div className="bg-white rounded-2xl border border-slate-200 p-3 shadow-sm">
                      <p className="text-[9px] font-black text-slate-400 uppercase mb-1">יתרה סופית</p>
                      <p className="text-2xl font-black text-blue-600">{formatCurrency(simulation.finalBalance)}</p>
                    </div>
                    <div className="bg-white rounded-2xl border border-slate-200 p-3 shadow-sm">
                      <p className="text-[9px] font-black text-slate-400 uppercase mb-1">סה"כ הפקדות</p>
                      <p className="text-2xl font-black text-slate-700">{formatCurrency(simulation.totalDeposited)}</p>
                    </div>
                  </div>

                  {/* Chart */}
                  <Section title="גרף צבירת הון" icon={TrendingUp} defaultOpen={true}>
                    <div className="pt-3 h-52">
                      <ResponsiveContainer width="100%" height="100%">
                        <AreaChart data={simulation.schedule} margin={{ top: 10, right: 0, left: 0, bottom: 0 }}>
                          <defs>
                            <linearGradient id="colorBal" x1="0" y1="0" x2="0" y2="1">
                              <stop offset="5%" stopColor="#10b981" stopOpacity={0.15}/>
                              <stop offset="95%" stopColor="#10b981" stopOpacity={0}/>
                            </linearGradient>
                          </defs>
                          <CartesianGrid strokeDasharray="3 3" vertical={false} stroke="#f1f5f9" />
                          <XAxis dataKey="date" interval={Math.floor(simulation.schedule.length/5)} tick={{fontSize: 9, fontWeight: 700, fill: '#94a3b8'}} axisLine={false} tickLine={false} />
                          <YAxis tickFormatter={v => (v/1000).toFixed(0)+'K'} tick={{fontSize: 9, fontWeight: 700, fill: '#94a3b8'}} axisLine={false} tickLine={false} width={35} />
                          <Tooltip contentStyle={{ borderRadius: '16px', border: 'none', boxShadow: '0 10px 20px -8px rgba(0,0,0,0.1)', direction: 'rtl', padding: '10px', fontSize: '11px' }} formatter={v => [formatCurrency(v), ""]} />
                          <Area type="monotone" dataKey="balanceEnd" name="יתרה" stroke="#10b981" fill="url(#colorBal)" strokeWidth={3} />
                          {simulation.schedule.filter(s => s.eventOccurred).map((s, i) => (
                            <ReferenceLine key={i} x={s.date} stroke="#f43f5e" strokeDasharray="6 6" />
                          ))}
                        </AreaChart>
                      </ResponsiveContainer>
                    </div>
                  </Section>

                  {/* Events table - mobile cards */}
                  <Section title="פירוט משיכות" icon={Wallet} color="text-blue-600" defaultOpen={true}>
                    <div className="pt-3 space-y-3 print-expand overflow-y-auto max-h-[500px]">
                      {!simulation.success && (
                        <div className="bg-rose-50 text-rose-600 px-3 py-2 rounded-xl flex items-center gap-2 text-xs font-bold">
                          <AlertCircle size={14} /> החיסכון אינו מספיק לכל המשיכות
                        </div>
                      )}
                      {simulation.schedule.filter(s => s.withdrawalGross).map((item, idx) => (
                        <div key={idx} className="bg-slate-50 border border-slate-100 rounded-2xl p-3 space-y-2">
                          <div className="flex items-center justify-between">
                            <span className="font-black text-slate-900 text-sm">{item.eventOccurred?.name}</span>
                            <span className="text-xs text-slate-400 font-bold">{item.date}</span>
                          </div>
                          <div className="grid grid-cols-2 gap-x-4 gap-y-1 text-xs">
                            <div>
                              <span className="text-slate-400 font-bold">הפקדה בתקופה:</span>
                              <span className="font-black text-blue-600 mr-1">{formatCurrency(item.deposit)}</span>
                            </div>
                            <div>
                              <span className="text-slate-400 font-bold">הון לפני משיכה:</span>
                              <span className="font-black text-slate-700 mr-1">{formatCurrency(item.preWithdrawalBalance)}</span>
                            </div>
                            <div>
                              <span className="text-slate-400 font-bold">ברוטו:</span>
                              <span className="font-bold text-slate-600 mr-1">{formatCurrency(item.withdrawalGross)}</span>
                            </div>
                            <div>
                              <span className="text-slate-400 font-bold">מס:</span>
                              <span className="font-bold text-rose-500 mr-1">-{formatCurrency(item.taxPaid || 0)}</span>
                            </div>
                          </div>
                          <div className="border-t border-slate-200 pt-2 flex items-center justify-between">
                            <span className="text-xs font-black text-slate-400 uppercase">נטו ביד</span>
                            <span className="text-lg font-black text-emerald-600">{formatCurrency(item.withdrawalNet || 0)}</span>
                          </div>
                        </div>
                      ))}
                    </div>
                  </Section>
                </div>
              )}
            </main>

            <footer className="mt-10 text-center pb-6">
              <p className="text-slate-300 text-[9px] font-black uppercase tracking-widest">Family Savings Planner © 2026</p>
            </footer>
          </div>
        );
      };

      const container = document.getElementById('root');
      if (container) { createRoot(container).render(<App />); }
    </script>
